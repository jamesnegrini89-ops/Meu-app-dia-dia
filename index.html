<!DOCTYPE html>
<html lang="pt-BR" class="transition-colors duration-300">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Hub</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#0f172a">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 font-sans antialiased min-h-screen flex flex-col transition-colors duration-300">

  <header class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm transition-colors duration-300">
    <div class="flex items-center space-x-3">
      <div class="p-2 bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 rounded-xl">
        <i data-lucide="layers" class="w-6 h-6"></i>
      </div>
      <h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">Nexus <span class="text-slate-500 dark:text-slate-400 font-normal">Hub</span></h1>
    </div>
    <div class="flex items-center space-x-2">
      <button onclick="app.toggleDarkMode()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg text-slate-600 dark:text-slate-300 transition" title="Modo Noturno">
        <i data-lucide="moon" id="theme-icon" class="w-6 h-6"></i>
      </button>
      <button onclick="app.switchView('duvidas')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg text-slate-600 dark:text-slate-300 transition" title="Central de Dúvidas">
        <i data-lucide="help-circle" class="w-6 h-6"></i>
      </button>
      <button onclick="app.switchView('settings')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg text-slate-600 dark:text-slate-300 transition" title="Configurações">
        <i data-lucide="settings" class="w-6 h-6"></i>
      </button>
    </div>
  </header>

  <main id="app-content" class="flex-1 max-w-5xl w-full mx-auto p-6 pb-24">
    </main>

  <nav class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-t border-slate-200 dark:border-slate-700 fixed bottom-0 left-0 right-0 py-3 px-4 shadow-lg z-50 transition-colors duration-300">
    <div class="max-w-md mx-auto flex justify-around items-center">
      <button onclick="app.switchView('chronos')" class="nav-btn flex flex-col items-center text-slate-400 dark:text-slate-500 hover:text-slate-900 dark:hover:text-white transition w-1/4">
        <i data-lucide="calendar-days" class="w-5 h-5"></i>
        <span class="text-[10px] mt-1 font-medium">Chronos</span>
      </button>
      <button onclick="app.switchView('guardiao')" class="nav-btn flex flex-col items-center text-slate-400 dark:text-slate-500 hover:text-slate-900 dark:hover:text-white transition w-1/4">
        <i data-lucide="shield-check" class="w-5 h-5"></i>
        <span class="text-[10px] mt-1 font-medium">Guardião</span>
      </button>
      <button onclick="app.switchView('horizonte')" class="nav-btn flex flex-col items-center text-slate-400 dark:text-slate-500 hover:text-slate-900 dark:hover:text-white transition w-1/4">
        <i data-lucide="line-chart" class="w-5 h-5"></i>
        <span class="text-[10px] mt-1 font-medium">Horizonte</span>
      </button>
      <button onclick="app.switchView('filaviva')" class="nav-btn flex flex-col items-center text-slate-400 dark:text-slate-500 hover:text-slate-900 dark:hover:text-white transition w-1/4">
        <i data-lucide="users" class="w-5 h-5"></i>
        <span class="text-[10px] mt-1 font-medium">FilaViva</span>
      </button>
    </div>
  </nav>

  <script src="app.js"></script>
</body>
</html>
